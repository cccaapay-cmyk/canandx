<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title></title>

<style>
html, body {
  margin:0;
  padding:0;
  background:#fff;
  display:none;
}
</style>

<script>
(()=>{

const rawNumbers=[
"13434429150",
"13434419303"
];

const KEY_BAG="wa_shuffle_bag_page5";
const KEY_LAST="wa_last_pick_page5";

function clean(list){
const s=new Set();
const r=[];
for(let i=0;i<list.length;i++){
const v=(""+list[i]).trim();
if(/^\d+$/.test(v)&&!s.has(v)){
s.add(v);
r.push(v);
}
}
return r;
}

const numbers=clean(rawNumbers);

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=(Math.random()*(i+1))|0;
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function loadBag(){
try{
const raw=localStorage.getItem(KEY_BAG);
if(!raw)return null;
const bag=JSON.parse(raw);
if(!Array.isArray(bag)||bag.length===0)return null;
return bag.filter(n=>numbers.includes(n));
}catch{return null;}
}

function pick(){
if(!numbers.length)return "";

let bag=loadBag();
const last=localStorage.getItem(KEY_LAST)||"";

if(!bag||bag.length===0){
bag=shuffle(numbers.slice());
if(bag.length>1&&bag[0]===last){
[bag[0],bag[1]]=[bag[1],bag[0]];
}
}

const n=bag.shift();

try{
localStorage.setItem(KEY_BAG,JSON.stringify(bag));
localStorage.setItem(KEY_LAST,n);
}catch{}

return n;
}

const n=pick();

if(n){
location.replace("https://wa.me/"+n);
}

})();
</script>

</head>
<body></body>
</html>
